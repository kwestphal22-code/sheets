<!DOCTYPE html>
<html>
<head>
  <title>SpaceOptions</title>
</head>
<body>

<h1>Welcome to SpaceOptions</h1>
<p>Enter Access Code:</p>

<input type="password" id="code">
<button onclick="login()">Enter</button>

<script>
function login() {
  const code = document.getElementById("code").value;

  if (code === "1111") {
    window.location.href = "builder.html";
  } else if (code === "2222") {
    window.location.href = "builder.html";
  } else if (code === "3333") {
    window.location.href = "builder.html";
  } else if (code === "9999") {
    window.location.href = "manager.html";
  } else {
    alert("Invalid code");
  }
}
</script>

</body>
</html>
